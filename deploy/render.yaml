services:
  - type: web
    name: billsutra-api
    env: node
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /ready
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: ENABLE_SCHEDULER
        value: "false"

  - type: worker
    name: billsutra-worker
    env: node
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run worker:start
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production

  - type: web
    name: billsutra-scheduler
    env: node
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /ready
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: ENABLE_SCHEDULER
        value: "true"
