name: Assistant Parser CI

on:
  pull_request:
    paths:
      - server/**
      - .github/workflows/assistant-parser-ci.yml
  workflow_dispatch:

jobs:
  assistant-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run assistant parser tests
        run: npm run test:assistant-parser --workspace server

      - name: Run assistant integration tests
        run: npm run test:assistant-integration --workspace server

      - name: Run assistant chatflow E2E tests
        run: npm run test:assistant-chatflow --workspace server

      - name: Build server
        run: npm run build --workspace server
