name: Assistant Parser CI

on:
  pull_request:
    paths:
      - server/**
      - .github/workflows/assistant-parser-ci.yml
  workflow_dispatch:

jobs:
  assistant-parser:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_WORKSPACES: "false"
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run assistant parser tests
        run: npm run test:assistant-parser

      - name: Run assistant integration tests
        run: npm run test:assistant-integration

      - name: Run assistant chatflow E2E tests
        run: npm run test:assistant-chatflow

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build server
        run: npm run build
