name: CI

on:
  push:
    branches:
      - main
      - feat/gourav
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version:
          - "20.19.0"
          - "22.x"

    env:
      CI: "true"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "test-secret"
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PRISMA_HIDE_UPDATE_MESSAGE: "1"
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/billsutra_ci?schema=public"
      DIRECT_URL: "postgresql://ci:ci@127.0.0.1:5432/billsutra_ci?schema=public"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate:ci --workspace server

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
